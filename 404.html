<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pàgina no trobada — Pa &amp; Xocolà</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#2B1D14">
<link rel="icon" href="assets/logo.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 20px;font-family:'Inter',system-ui,sans-serif;background:#2B1D14;color:#F6EFE1;}
  .box{max-width:520px;}
  img{width:96px;height:auto;margin:0 auto 24px;filter:drop-shadow(0 10px 26px rgba(0,0,0,0.4));}
  h1{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(2.4rem,8vw,4rem);margin:0 0 10px;letter-spacing:-0.02em;}
  p{color:rgba(246,239,225,0.82);font-size:1.05rem;line-height:1.6;margin:0 0 28px;}
  a.btn{display:inline-block;font-weight:600;color:#2B1D14;background:#E39A2E;padding:14px 28px;border-radius:999px;text-decoration:none;transition:transform .25s ease,filter .25s ease;}
  a.btn:hover{transform:translateY(-2px);filter:brightness(1.05);}
</style>
</head>
<body>
  <div class="box">
    <img src="assets/logo.png" alt="Logotip de Pa &amp; Xocolà">
    <h1>Aquesta safata és buida</h1>
    <p>La pàgina que busques s'ha venut o mai no ha existit. Torna al forn, que sempre hi ha alguna cosa acabada de fer.</p>
    <a class="btn" href="https://silviaestevesalvany.github.io/pa-xocola/">Torna a l'inici</a>
  </div>
</body>
</html>
